<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Greeting</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f8ff;
            overflow: hidden;
        }
        h1 {
            color: #ff69b4;
            font-size: 5em;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .confetti {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: gold;
            opacity: 0.7;
            animation: fall 3s linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body>
    <h1>Happiest 22nd Birthday Sidra!</h1>
    <audio id="audio" src="birthday-song.mp3" preload="auto"></audio>
    <script>
        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = ["red", "blue", "green", "yellow", "purple"][Math.floor(Math.random() * 5)];
                document.body.appendChild(confetti);
                // Remove confetti after a while
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function playSound() {
            const audio = document.getElementById('audio');
            audio.play();
        }

        window.onload = function() {
            createConfetti();
            playSound();
        };
    </script>
</body>
</html>
