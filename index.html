<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happiest 22nd Birthday Sidra</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at top, #050816, #02010a 60%);
            overflow: hidden;
        }
        h1 {
            color: #ff69b4;
            font-size: 3.5em;
            text-align: center;
            padding: 0 10px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .confetti {
            position: absolute;
            width: 6px;
            height: 12px;
            border-radius: 2px;
            opacity: 0.8;
            animation: fall 3s linear infinite;
        }
        @keyframes fall {
            0%   { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Happiest 22nd Birthday<br>Sidra 🎉💖</h1>

    <!-- Put your own birthday song file in the same folder and keep this name -->
    <audio id="audio" src="birthday-song.mp3" preload="auto"></audio>

    <script>
        function createConfetti() {
            const colors = ["#ff4b91", "#ffdd57", "#3ca8ab", "#7f5af0", "#ff9a62"];
            for (let i = 0; i < 120; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = (Math.random() * 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3500);
            }
        }

        function playSound() {
            const audio = document.getElementById('audio');
            audio.play().catch(() => {
                // some browsers need a click first
            });
        }

        window.onload = function() {
            createConfetti();
            playSound();
        };
    </script>
</body>
</html>
